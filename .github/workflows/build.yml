name: Build ZMK firmware

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      groups: ${{ steps.matrix.outputs.groups }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate build matrix
        id: matrix
        shell: bash
        run: |
          python scripts/generate_matrix.py > build.json
          printf 'groups=%s\n' "$(cat build.json)" >> "$GITHUB_OUTPUT"
          cat build.json

  build:
    name: Build ${{ matrix.combo.name }}
    needs: setup
    runs-on: ubuntu-latest
    container: zmkfirmware/zmk-build-arm:stable

    strategy:
      fail-fast: false
      matrix:
        combo: ${{ fromJson(needs.setup.outputs.groups) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize west workspace
        shell: bash
        run: |
          set -euxo pipefail
          west init -l --mf "$GITHUB_WORKSPACE/config/west.yml" "$GITHUB_WORKSPACE/config"
          west update
          west zephyr-export
          test -d "$GITHUB_WORKSPACE/zmk-pmw3610-driver"
          find "$GITHUB_WORKSPACE/zmk-pmw3610-driver" -maxdepth 2 -type f \( -name 'module.yml' -o -name 'Kconfig' \) -print

      - name: Stage keymap and shield files
        if: ${{ matrix.combo.format != 'reset' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p zmk/app/overlays
          cp "config/keymap/${{ matrix.combo.keymap }}.keymap" zmk/app/overlays/charybdis.keymap
          cp config/*.conf zmk/app/overlays/ 2>/dev/null || true
          cp config/*.dtsi zmk/app/overlays/ 2>/dev/null || true
          cp config/keymap/*.dtsi zmk/app/overlays/ 2>/dev/null || true

          zmk_shields_dir="$GITHUB_WORKSPACE/zmk/app/boards/shields"
          mkdir -p "$zmk_shields_dir"
          cp -r boards/shields/charybdis_bt "$zmk_shields_dir/"
          for file in charybdis-layouts.dtsi charybdis_pmw3610.dtsi charybdis_pointer.dtsi; do
            [ -f "config/$file" ] && cp "config/$file" "$zmk_shields_dir/charybdis_bt/" || true
          done

      - name: Build firmware
        shell: bash
        working-directory: zmk/app
        run: |
          set -euo pipefail

          board="${{ matrix.combo.board }}"
          format="${{ matrix.combo.format }}"
          name="${{ matrix.combo.name }}"
          repo_config_dir="$GITHUB_WORKSPACE/config"
          staged_config_dir="$GITHUB_WORKSPACE/zmk/app/overlays"
          output_dir="$GITHUB_WORKSPACE/out/$name"
          mkdir -p "$output_dir"

          if [[ "$format" == "reset" ]]; then
            shields="settings_reset"
            config_dir="$repo_config_dir"
          else
            shields="charybdis_left charybdis_right"
            config_dir="$staged_config_dir"
          fi

          for shield in $shields; do
            build_dir="$(mktemp -d)"
            export KCONFIG_WARNINGS_AS_ERRORS=0

            cmake_args=(
              "-DZMK_CONFIG=$config_dir"
              "-DSHIELD=$shield"
              "-DBOARD_ROOT=$GITHUB_WORKSPACE/zmk/app"
              "-DSHIELD_ROOT=$GITHUB_WORKSPACE/zmk/app"
              "-DZEPHYR_EXTRA_MODULES=$GITHUB_WORKSPACE/zmk-pmw3610-driver"
              "-DKCONFIG_ERROR_ON_WARNINGS=OFF"
            )

            if [[ "$format" != "reset" ]]; then
              cmake_args+=("-DKEYMAP_FILE=$config_dir/charybdis.keymap")
              cmake_args+=("-DEXTRA_CONF_FILE=$config_dir/charybdis.conf;$config_dir/$shield.conf")
            fi

            if [[ "$shield" == "charybdis_right" ]]; then
              cmake_args+=("-DSNIPPET=studio-rpc-usb-uart")
            fi

            west build -p \
              -d "$build_dir" \
              -b "$board" \
              -- \
              "${cmake_args[@]}"

            artifact="$(if [[ -f "$build_dir/zephyr/zmk.uf2" ]]; then echo zmk.uf2; else echo zmk.bin; fi)"
            cp "$build_dir/zephyr/$artifact" "$output_dir/$shield.${artifact##*.}"
          done

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: charybdis-${{ matrix.combo.name }}
          path: ${{ github.workspace }}/out/${{ matrix.combo.name }}/**
