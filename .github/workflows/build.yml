name: Build ZMK firmware

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      groups: ${{ steps.matrix.outputs.groups }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate build matrix
        id: matrix
        shell: bash
        run: |
          python scripts/generate_matrix.py > build.json
          printf 'groups=%s\n' "$(cat build.json)" >> "$GITHUB_OUTPUT"
          cat build.json

  build:
    name: Build ${{ matrix.combo.name }}
    needs: setup
    runs-on: ubuntu-latest
    container: zmkfirmware/zmk-build-arm:stable

    strategy:
      fail-fast: false
      matrix:
        combo: ${{ fromJson(needs.setup.outputs.groups) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize west workspace
        shell: bash
        run: |
          set -euxo pipefail
          west init -l --mf "$GITHUB_WORKSPACE/config/west.yml" "$GITHUB_WORKSPACE/config"
          west update
          west zephyr-export
          sed -i 's/#define Z_DEVICE_MAX_NAME_LEN 48U/#define Z_DEVICE_MAX_NAME_LEN 128U/' zephyr/include/zephyr/device.h
          find zmk/app/boards/shields/clueboard_california -name Kconfig.defconfig -exec sed -i '/ZMK_KSCAN_DIRECT_POLLING/d' {} \;
          test -d "$GITHUB_WORKSPACE/zmk-pmw3610-driver"
          find "$GITHUB_WORKSPACE/zmk-pmw3610-driver" -maxdepth 2 -type f \( -name 'module.yml' -o -name 'Kconfig' \) -print
          grep -RIl 'config PMW3610' "$GITHUB_WORKSPACE/zmk-pmw3610-driver" |
            while IFS= read -r kconfig_file; do
              echo "Adding PMW3610 Kconfig: $kconfig_file"
              printf '\nosource "%s"\n' "$kconfig_file" >> zmk/app/Kconfig
            done

      - name: Stage keymap and shield files
        if: ${{ matrix.combo.format != 'reset' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p zmk/app/overlays
          cp config/*.conf zmk/app/overlays/ 2>/dev/null || true
          for file in config/*.dtsi; do
            [ -e "$file" ] || continue
            [ "$(basename "$file")" = "charybdis-layouts.dtsi" ] && continue
            cp "$file" zmk/app/overlays/
          done
          cp config/keymap/*.dtsi zmk/app/overlays/ 2>/dev/null || true
          echo "--- staged charybdis_right.conf ---"
          cat zmk/app/overlays/charybdis_right.conf
          if grep -Eq '^CONFIG_PMW3610($|=|_(SMART|SWAP|INVERT|REPORT|RUN|REST|INIT|LOG))' zmk/app/overlays/charybdis_right.conf; then
            echo "Old PMW3610 Kconfig symbols found in staged charybdis_right.conf"
            exit 1
          fi

          zmk_shields_dir="$GITHUB_WORKSPACE/zmk/app/boards/shields"
          mkdir -p "$zmk_shields_dir"
          cp -r boards/shields/charybdis_bt "$zmk_shields_dir/"
          cp "config/keymap/${{ matrix.combo.keymap }}.keymap" "$zmk_shields_dir/charybdis_bt/charybdis_left.keymap"
          cp "config/keymap/${{ matrix.combo.keymap }}.keymap" "$zmk_shields_dir/charybdis_bt/charybdis_right.keymap"
          cp config/keymap/*.dtsi "$zmk_shields_dir/charybdis_bt/" 2>/dev/null || true
          printf '\n#include "charybdis_left.keymap"\n' >> "$zmk_shields_dir/charybdis_bt/charybdis_left.overlay"
          printf '\n#include "charybdis_right.keymap"\n' >> "$zmk_shields_dir/charybdis_bt/charybdis_right.overlay"
          echo "--- staged shield keymap includes ---"
          tail -n 5 "$zmk_shields_dir/charybdis_bt/charybdis_left.overlay"
          tail -n 5 "$zmk_shields_dir/charybdis_bt/charybdis_right.overlay"
          for file in charybdis-layouts.dtsi charybdis_pmw3610.dtsi charybdis_pointer.dtsi; do
            [ -f "config/$file" ] && cp "config/$file" "$zmk_shields_dir/charybdis_bt/" || true
          done

      - name: Build firmware
        shell: bash
        working-directory: zmk/app
        run: |
          set -euo pipefail

          board="${{ matrix.combo.board }}"
          format="${{ matrix.combo.format }}"
          name="${{ matrix.combo.name }}"
          repo_config_dir="$GITHUB_WORKSPACE/config"
          staged_config_dir="$GITHUB_WORKSPACE/zmk/app/overlays"
          output_dir="$GITHUB_WORKSPACE/out/$name"
          mkdir -p "$output_dir"

          if [[ "$format" == "reset" ]]; then
            shields="settings_reset"
            config_dir="$repo_config_dir"
          else
            shields="charybdis_left charybdis_right"
            config_dir="$staged_config_dir"
          fi

          for shield in $shields; do
            build_dir="$(mktemp -d)"
            export KCONFIG_WARNINGS_AS_ERRORS=0

            if [[ "$format" == "reset" ]]; then
              west build -p \
                -d "$build_dir" \
                -b "$board" \
                -- \
                "-DSHIELD=$shield" \
                "-DBOARD_ROOT=$GITHUB_WORKSPACE/zmk/app" \
                "-DSHIELD_ROOT=$GITHUB_WORKSPACE/zmk/app" \
                "-DKCONFIG_ERROR_ON_WARNINGS=OFF"

              artifact="$(if [[ -f "$build_dir/zephyr/zmk.uf2" ]]; then echo zmk.uf2; else echo zmk.bin; fi)"
              cp "$build_dir/zephyr/$artifact" "$output_dir/$shield.${artifact##*.}"
              continue
            fi

            cmake_args=(
              "-DZMK_CONFIG=$config_dir"
              "-DSHIELD=$shield"
              "-DBOARD_ROOT=$GITHUB_WORKSPACE/zmk/app"
              "-DSHIELD_ROOT=$GITHUB_WORKSPACE/zmk/app"
              "-DZEPHYR_EXTRA_MODULES=$GITHUB_WORKSPACE/zmk-pmw3610-driver"
              "-DKCONFIG_ERROR_ON_WARNINGS=OFF"
            )

            if [[ "$format" != "reset" ]]; then
              cmake_args+=("-DEXTRA_CONF_FILE=$config_dir/charybdis.conf;$config_dir/$shield.conf")
              if [[ "$shield" == "charybdis_right" ]]; then
                cmake_args+=("-DSNIPPET=studio-rpc-usb-uart")
              fi
            fi

            west build -p \
              -d "$build_dir" \
              -b "$board" \
              -- \
              "${cmake_args[@]}"

            artifact="$(if [[ -f "$build_dir/zephyr/zmk.uf2" ]]; then echo zmk.uf2; else echo zmk.bin; fi)"
            cp "$build_dir/zephyr/$artifact" "$output_dir/$shield.${artifact##*.}"
          done

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: charybdis-${{ matrix.combo.name }}
          path: ${{ github.workspace }}/out/${{ matrix.combo.name }}/**
